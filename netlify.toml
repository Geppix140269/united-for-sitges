[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/support"
  to = "/#join"
  status = 301

[[redirects]]
  from = "/donate"
  to = "/#donate"
  status = 301

[[redirects]]
  from = "/vote"
  to = "/#vote-rights"
  status = 301

[[redirects]]
  from = "/cere"
  to = "/#vote-rights"
  status = 301
